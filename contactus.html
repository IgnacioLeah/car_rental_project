<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CaRs | Contact</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
}

/* SECTION */
.contact{
    min-height:100vh;
    padding:50px 100px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* TITLE */
.content{
    width:100%;
    text-align:center;
    margin-bottom:30px;
}

.content h1{
    color:#fff;
    font-size:40px;
    letter-spacing:2px;
}

/* MAIN CONTAINER */
.container{
    width:100%;
    display:flex;
    justify-content:center;
    gap:40px;
}

/* LEFT SIDE */
.contactInfo{
    width:40%;
    display:flex;
    flex-direction:column;
}

.box{
    display:flex;
    align-items:center;
    padding:20px;
    margin:10px 0;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    backdrop-filter:blur(10px);
}

.icon{
    min-width:50px;
    height:50px;
    background:#00c6ff;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    font-size:20px;
    color:#fff;
    margin-right:15px;
}

.text h3{
    color:#00c6ff;
}

.text p{
    color:#fff;
    font-size:14px;
}

/* RIGHT SIDE FORM */
.contactForm{
    width:40%;
    padding:30px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    backdrop-filter:blur(10px);
}

.contactForm h2{
    color:#fff;
    margin-bottom:20px;
}

/* INPUT */
.inputBox{
    position:relative;
    width:100%;
    margin-top:10px;
}

.inputBox input,
.inputBox textarea{
    width:100%;
    padding:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.2);
    color:#fff;
    border-radius:5px;
}

.inputBox span{
    position:absolute;
    left:10px;
    top:10px;
    color:#ccc;
    transition:0.3s;
    pointer-events:none;
}

.inputBox input:focus ~ span,
.inputBox textarea:focus ~ span,
.inputBox input:valid ~ span,
.inputBox textarea:valid ~ span{
    top:-12px;
    font-size:12px;
    color:#00c6ff;
}

/* BUTTON */
.inputBox input[type="submit"]{
    background:#00c6ff;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

.inputBox input[type="submit"]:hover{
    background:#0099cc;
}

/* HOME BUTTON */
.home-btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#ff7b00;
    color:#fff;
    text-decoration:none;
    border-radius:5px;
}

.home-btn:hover{
    background:#cc6300;
}

/* RESPONSIVE */
@media(max-width:900px){
    .container{
        flex-direction:column;
    }
    .contactInfo,
    .contactForm{
        width:100%;
    }
}
</style>

</head>

<body>

<section class="contact">

<div>
    <div class="content">
        <h1>CONTACT US</h1>
    </div>

    <div class="container">

        <!-- LEFT -->
        <div class="contactInfo">

            <div class="box">
                <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="text">
                    <h3>Address</h3>
                    <p>Cebu City, Philippines</p>
                </div>
            </div>

            <div class="box">
                <div class="icon"><i class="fas fa-phone-alt"></i></div>
                <div class="text">
                    <h3>Phone</h3>
                    <p>+63 912 345 6789</p>
                </div>
            </div>

            <div class="box">
                <div class="icon"><i class="fas fa-envelope"></i></div>
                <div class="text">
                    <h3>Email</h3>
                    <p>contact@cars.com</p>
                </div>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="contactForm">
            <form onsubmit="sendMsg(event)">
                <h2>Send Message</h2>

                <div class="inputBox">
                    <input type="text" required>
                    <span>Full Name</span>
                </div>

                <div class="inputBox">
                    <input type="email" required>
                    <span>Email</span>
                </div>

                <div class="inputBox">
                    <textarea required></textarea>
                    <span>Your Message</span>
                </div>

                <div class="inputBox">
                    <input type="submit" value="Send">
                </div>

                <a href="index.php" class="home-btn">Go To Home</a>
            </form>
        </div>

    </div>
</div>

</section>

<script>
function sendMsg(e){
    e.preventDefault();
    alert("Message sent! (Frontend only)");
}
</script>

</body>
</html>
